<!DOCTYPE html>
<html><head><style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;width:100%;height:100%;}
#player{width:100%;height:100%;}

/* Скрываем все субтитры принудительно */
.ytp-caption-window-container,
.ytp-caption-window,
.caption-window,
.ytp-subtitles-button,
.ytp-caption-settings,
.ytp-caption-settings-menu,
#ytp-caption-window-container,
#ytp-caption-window,
.ytp-caption-panel,
.ytp-caption-panel-content {
    display: none !important;
    visibility: hidden !important;
    opacity: 0 !important;
    pointer-events: none !important;
}
</style></head>
<body>
<div id="player"></div>
<script>
var player;
var isReady = false;
var pendingId = null;
var pendingStart = 0;
var lastVolume = 80;
var skipInterval = null;
var volumeRecoveryInterval = null;

var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: {
            autoplay: 1,
            controls: 0,
            disablekb: 1,
            modestbranding: 1,
            rel: 0,
            playsinline: 1,
            cc_load_policy: 0,
            iv_load_policy: 3,
            origin: window.location.origin,
            fs: 0
        },
        events: {
            'onReady': function(e) {
                isReady = true;
                e.target.setVolume(80);
                if (pendingId) {
                    e.target.loadVideoById({ videoId: pendingId, startSeconds: pendingStart });
                }
                // Запускаем автоматический пропуск рекламы
                startAdSkipper();
                // Запускаем восстановление громкости
                startVolumeRecovery();
            },
            'onStateChange': function(e) {
                // Перезапускаем скиппер при смене состояния (например, началась реклама)
                if (e.data == YT.PlayerState.PLAYING) {
                    startAdSkipper();
                }
            }
        }
    });
}

// Автоматический пропуск рекламы
function startAdSkipper() {
    if (skipInterval) clearInterval(skipInterval);
    skipInterval = setInterval(function() {
        try {
            // Ищем кнопку "Skip Ad" / "Пропустить"
            var skipBtn = document.querySelector('.ytp-ad-skip-button, .ytp-ad-skip-button-modern, .ytp-skip-ad-button');
            if (skipBtn && skipBtn.offsetParent !== null) {
                skipBtn.click();
            }
            
            // Закрываем рекламные баннеры
            var closeButtons = document.querySelectorAll('.ytp-ad-overlay-close-button, .ytp-ad-overlay-close-container');
            for (var i = 0; i < closeButtons.length; i++) {
                if (closeButtons[i].offsetParent !== null) {
                    closeButtons[i].click();
                }
            }
            
            // Закрываем оверлеи
            var overlays = document.querySelectorAll('.ytp-ad-overlay-container, .ytp-ad-overlay-image, .ytp-ad-overlay-ad-info-button-container');
            for (var i = 0; i < overlays.length; i++) {
                if (overlays[i].offsetParent !== null) {
                    overlays[i].style.display = 'none';
                }
            }
        } catch(e) {}
    }, 500); // проверяем каждые 500 мс
}

// Восстановление громкости (реклама может отключить звук)
function startVolumeRecovery() {
    if (volumeRecoveryInterval) clearInterval(volumeRecoveryInterval);
    volumeRecoveryInterval = setInterval(function() {
        try {
            if (player && player.setVolume && !player.isMuted()) {
                player.setVolume(lastVolume);
            }
        } catch(e) {}
    }, 2000);
}

function CLS63_LoadVideo(id, startSeconds) {
    pendingId = id;
    pendingStart = startSeconds || 0;
    if (isReady && player && player.loadVideoById) {
        player.loadVideoById({ videoId: id, startSeconds: startSeconds || 0 });
        startAdSkipper();
    }
}

function CLS63_SetVolume(v) {
    lastVolume = v;
    if (isReady && player && player.setVolume) player.setVolume(v);
}

function CLS63_Stop() {
    pendingId = null;
    if (skipInterval) clearInterval(skipInterval);
    if (volumeRecoveryInterval) clearInterval(volumeRecoveryInterval);
    if (isReady && player && player.stopVideo) player.stopVideo();
}
</script>
</body></html>
