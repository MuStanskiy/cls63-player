<!DOCTYPE html>
<html><head><style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;width:100%;height:100%;}
#player{width:100%;height:100%;}
</style></head>
<body>
<div id="player"></div>
<script>
var player;
var isReady = false;
var pendingId = null;
var pendingStart = 0;
var lastVolume = 80;

var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

function disableCaptions() {
    try {
        if (player && player.setOption) {
            player.setOption('captions', 'track', {});
        }
    } catch (e) {}
}

function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: {
            autoplay: 1,
            controls: 0,
            disablekb: 1,
            modestbranding: 1,
            rel: 0,
            playsinline: 1,
            cc_load_policy: 0,
            iv_load_policy: 3,
            origin: window.location.origin
        },
        events: {
            'onReady': function(e) {
                isReady = true;
                e.target.setVolume(lastVolume);
                if (pendingId) {
                    e.target.loadVideoById({ videoId: pendingId, startSeconds: pendingStart });
                }
                disableCaptions();
            },
            'onStateChange': function(e) {
                // При старте нового видео/рекламы субтитры YouTube иногда
                // включает заново - подавляем их через официальный API ещё раз.
                if (e.data == YT.PlayerState.PLAYING) {
                    disableCaptions();
                }
            }
        }
    });
}

function CLS63_LoadVideo(id, startSeconds) {
    pendingId = id;
    pendingStart = startSeconds || 0;
    if (isReady && player && player.loadVideoById) {
        player.loadVideoById({ videoId: id, startSeconds: startSeconds || 0 });
    }
}
function CLS63_SetVolume(v) {
    lastVolume = v;
    if (isReady && player && player.setVolume) player.setVolume(v);
}
function CLS63_Stop() {
    pendingId = null;
    if (isReady && player && player.stopVideo) player.stopVideo();
}
</script>
</body></html>
